services:
  db:
    image: postgres:16-alpine
    container_name: herbarium_db
    environment:
      POSTGRES_USER: ${USERNAME:-herbarium}
      POSTGRES_PASSWORD: ${PASSWORD:-herbarium}
      POSTGRES_DB: ${DATABASE:-herbarium}
    ports: ["5433:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -U ${USERNAME:-herbarium} -d ${DATABASE:-herbarium}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [appnet]

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: herbarium_backend
    env_file:
      - backend/config/.env
    depends_on:
      db:
        condition: service_healthy
    ports: ["8000:8000"]
    command: ["sh", "-c", "python -m backend.scripts.create_models && python -m backend.scripts.create_admin && exec python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000"]
    networks: [appnet]

  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000/api
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_started
    networks: [appnet]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # If your React code reads import.meta.env.VITE_API_URL, you can point it at /api
        VITE_API_URL: /api
    container_name: herbarium_frontend
    depends_on:
      backend:
        condition: service_started
    ports:
      - "3000:80"   # http://localhost:3000
    networks: [appnet]

  seaweedfs:
    image: chrislusf/seaweedfs
    container_name: herbarium_seaweedfs
    ports:
      - "9333:9333"
      - "8080:8080"
      - "8888:8888" # Filer UI
      - "8333:8333" # S3 API
    command: "server -dir=/data -s3"
    networks: [appnet]

volumes:
  pgdata:

networks:
  appnet:
